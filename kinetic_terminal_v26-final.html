<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KINETIC 2.1 — Market Intelligence Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0e11; --surface: #14171a; --border: rgba(255,255,255,0.06);
            --border2: rgba(255,255,255,0.1); --green: #00ffaa; --red: #ff3355;
            --blue: #58a6ff; --amber: #ffcc00; --text: #ffffff; --muted: #707a8a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 13px; line-height: 1.5; }
        
        /* HEADER & TOPBAR */
        .topbar { display: flex; justify-content: space-between; align-items: center; padding: 12px 24px; background: var(--surface); border-bottom: 1px solid var(--border2); position: sticky; top: 0; z-index: 100; }
        .logo { display: flex; align-items: center; gap: 10px; font-weight: 900; letter-spacing: 2px; }
        .logo em { color: var(--green); font-style: normal; }
        
        .pill { background: var(--bg); border: 1px solid var(--border2); border-radius: 20px; padding: 4px 12px; font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
        .pill.active { border-color: rgba(0,255,170,0.3); color: var(--green); }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

        /* NAVIGATION */
        .nav-shell { display: flex; background: var(--surface); border-bottom: 1px solid var(--border2); padding: 0 24px; position: sticky; top: 57px; z-index: 99; }
        .nav-tab { padding: 14px 20px; font-size: 10px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; transition: 0.2s; }
        .nav-tab.active { color: var(--green); border-bottom-color: var(--green); }

        /* MAIN LAYOUT */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 16px; padding: 24px; }
        .card { background: var(--surface); border: 1px solid var(--border2); border-radius: 12px; overflow: hidden; }
        .card-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .card-title { font-size: 10px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 1.2px; }
        .card-body { padding: 16px; }

        /* KINETIC LISTS */
        .stat-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .stat-row:last-child { border: none; }
        .symbol { font-weight: 700; font-family: 'IBM Plex Mono', monospace; }
        .badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 4px; }
        .g { color: var(--green); background: rgba(0,255,170,0.1); }
        .r { color: var(--red); background: rgba(255,51,85,0.1); }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="topbar">
    <div class="logo">KINETIC <em>2.1</em></div>
    <div style="display: flex; gap: 12px;">
        <div class="pill active"><span class="dot"></span><span id="market-status">MARKET OPEN</span></div>
        <div class="pill"><span id="current-time">00:00:00</span></div>
    </div>
</div>

<nav class="nav-shell">
    <button class="nav-tab active" onclick="switchTab('macro')">Macro</button>
    <button class="nav-tab" onclick="switchTab('sectors')">Sectors</button>
    <button class="nav-tab" onclick="switchTab('compare')">Compare</button>
</nav>

<div id="macro" class="grid">
    <div class="card">
        <div class="card-header"><span class="card-title">Velocity Index (Macro)</span></div>
        <div class="card-body" id="macro-data">
            <div class="stat-row"><span class="symbol">SPY</span><span class="badge g">+1.2σ</span></div>
            <div class="stat-row"><span class="symbol">QQQ</span><span class="badge g">+1.8σ</span></div>
            <div class="stat-row"><span class="symbol">IWM</span><span class="badge r">-0.4σ</span></div>
            <div class="stat-row"><span class="symbol">VIX</span><span class="badge r">-2.1σ</span></div>
        </div>
    </div>
</div>

<div id="sectors" class="grid hidden">
    <div class="card">
        <div class="card-header"><span class="card-title">Sector Rotations</span></div>
        <div class="card-body" id="sector-data">
            </div>
    </div>
</div>

<div id="compare" class="grid hidden">
    <div class="card">
        <div class="card-header"><span class="card-title">Ticker Comparison Audit</span></div>
        <div class="card-body">
            <p style="color: var(--muted); font-size: 12px;">Input tickers to run Kinetic momentum physics comparison.</p>
        </div>
    </div>
</div>

<script>
    function switchTab(tabId) {
        document.querySelectorAll('.grid').forEach(g => g.classList.add('hidden'));
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        document.getElementById(tabId).classList.remove('hidden');
        event.currentTarget.classList.add('active');
    }

    function updateTime() {
        const now = new Date();
        document.getElementById('current-time').innerText = now.toLocaleTimeString();
    }

    setInterval(updateTime, 1000);
    updateTime();
</script>

</body>
</html>
