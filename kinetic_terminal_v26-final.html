<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=IBM+Plex+Mono:wght@500;700&display=swap" rel="stylesheet">
    <title>KINETIC TERMINAL</title>
    <style>
        :root { --bg: #0b0e11; --surface: #14171a; --green: #00ffaa; --red: #ff3355; --muted: #707a8a; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; padding-bottom: 20px; border-bottom: 1px solid #2d333b; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
        .card { background: var(--surface); padding: 20px; border-radius: 12px; border: 1px solid #2d333b; }
        .row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #2d333b; font-family: 'IBM Plex Mono', monospace; }
        .tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 900; }
        .up { color: var(--green); } .dn { color: var(--red); }
        .bg-up { background: rgba(0,255,170,0.1); color: var(--green); }
        .bg-dn { background: rgba(255,51,85,0.1); color: var(--red); }
    </style>
</head>
<body>
    <div class="header">
        <div style="font-weight:900; letter-spacing:2px;">KINETIC // TERMINAL</div>
        <div style="color:var(--green); font-size:12px;">● SYSTEM ACTIVE</div>
    </div>
    <div class="grid">
        <div class="card">
            <div style="font-size:10px; color:var(--muted); margin-bottom:15px;">MACRO VELOCITY</div>
            <div id="macro"></div>
        </div>
        <div class="card">
            <div style="font-size:10px; color:var(--muted); margin-bottom:15px;">SECTOR MOMENTUM</div>
            <div id="sectors"></div>
        </div>
        <div class="card">
            <div style="font-size:10px; color:var(--muted); margin-bottom:15px;">RISK INDICATORS</div>
            <div id="risk"></div>
        </div>
    </div>
    <script>
        const symbols = {
            macro: ['SPY', 'QQQ', 'IWM'],
            sectors: ['XLK', 'XLF', 'XLE'],
            risk: ['VIX', 'TNX', 'DXY']
        };
        async function getData(s) {
            try {
                const r = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${s}?interval=1d&range=5d`);
                const d = await r.json();
                const p = d.chart.result[0].indicators.quote[0].close.filter(x => x != null);
                const v = ((p[p.length-1]-p[0])/p[0]*100).toFixed(2);
                return { s, v, a: v > 0 ? 'ACCEL' : 'DECEL' };
            } catch(e) { return null; }
        }
        async function draw(id, list) {
            let h = '';
            for(const s of list) {
                const d = await getData(s);
                if(!d) continue;
                h += `<div class="row"><span>${d.s}</span><span><span class="${d.v>=0?'up':'dn'}">${d.v}%</span> <span class="tag ${d.a=='ACCEL'?'bg-up':'bg-dn'}">${d.a}</span></span></div>`;
            }
            document.getElementById(id).innerHTML = h;
        }
        draw('macro', symbols.macro); draw('sectors', symbols.sectors); draw('risk', symbols.risk);
    </script>
</body>
</html>
