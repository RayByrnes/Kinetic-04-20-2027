<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <title>KINETIC // STRATEGIC TERMINAL</title>
    <style>
    * { box-sizing: border-box; margin: 0; padding: 0 }
    :root {
        --bg: #0b0e11;
        --surface: #14171a;
        --border: rgba(255,255,255,0.06);
        --border2: rgba(255,255,255,0.12);
        --green: #00ffaa;
        --red: #ff3355;
        --blue: #58a6ff;
        --text: #ffffff;
        --muted: #707a8a;
        --dim: #8b94a3;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; font-size: 13px; overflow-x: hidden }
    
    /* TOPBAR LOGIC */
    .topbar { display: flex; justify-content: space-between; align-items: center; padding: 14px 24px; background: var(--surface); border-bottom: 1px solid var(--border2); position: sticky; top: 0; z-index: 100 }
    .logo-box { display: flex; align-items: center; gap: 10px }
    .logo-icon { width: 32px; height: 32px; background: #1a1e23; border-radius: 6px; display: flex; align-items: flex-end; justify-content: center; gap: 3px; padding-bottom: 6px }
    
    .status-group { display: flex; gap: 12px }
    .pill { background: var(--bg); border: 1px solid var(--border2); border-radius: 20px; padding: 5px 14px; font-size: 10px; font-weight: 800; color: var(--dim); display: flex; align-items: center; gap: 6px; letter-spacing: 1px }
    .pill.active { border-color: rgba(0,255,170,0.3); color: var(--green); background: rgba(0,255,170,0.06) }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor }

    /* MAIN GRID SYSTEM */
    .terminal-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 16px; padding: 24px }
    .card { background: var(--surface); border: 1px solid var(--border2); border-radius: 12px; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.4) }
    .ch { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.02) }
    .ct { font-size: 10px; font-weight: 900; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px }
    .cb { padding: 8px 20px 20px }

    /* PHYSICS DATA ROWS */
    .row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border) }
    .row:last-child { border: none }
    .sym { font-family: 'IBM Plex Mono', monospace; font-weight: 700; font-size: 15px; letter-spacing: -0.5px }
    .val { font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 14px }
    
    .physics-badge { font-size: 9px; font-weight: 900; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.5px }
    
    .up { color: var(--green) }
    .dn { color: var(--red) }
    .bg-up { background: rgba(0,255,170,0.12); color: var(--green); border: 1px solid rgba(0,255,170,0.2) }
    .bg-dn { background: rgba(255,51,85,0.12); color: var(--red); border: 1px solid rgba(255,51,85,0.2) }
    </style>
</head>
<body>

<div class="topbar">
    <div class="logo-box">
        <div class="logo-icon">
            <div style="width:4px;height:10px;background:#3b66f5;border-radius:1px"></div>
            <div style="width:4px;height:18px;background:#4ba1ff;border-radius:1px"></div>
            <div style="width:4px;height:24px;background:#00ffaa;border-radius:1px"></div>
        </div>
        <div style="display:flex;flex-direction:column;line-height:1">
            <b style="font-size:18px;letter-spacing:2px">KINETIC <span style="color:var(--green)">2.1</span></b>
            <span style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px">Quant Intelligence</span>
        </div>
    </div>
    <div class="status-group">
        <div class="pill active"><span class="dot"></span><span id="market-status">REGIME: RISK ON</span></div>
        <div class="pill"><span class="dot"></span><span id="market-phase">SCANNING...</span></div>
    </div>
</div>

<div class="terminal-grid">
    <div class="card">
        <div class="ch"><span class="ct">Macro Physics // 5D Velocity</span></div>
        <div class="cb" id="macro-list">
            <div class="row"><span>Initializing Terminal...</span></div>
        </div>
    </div>

    <div class="card">
        <div class="ch"><span class="ct">Sector Rotation // Acceleration</span></div>
        <div class="cb" id="sector-list">
            <div class="row"><span>Initializing Terminal...</span></div>
        </div>
    </div>

    <div class="card">
        <div class="ch"><span class="ct">Systemic Risk // Volatility</span></div>
        <div class="cb" id="risk-list">
            <div class="row"><span>Initializing Terminal...</span></div>
        </div>
    </div>
</div>

        sectors: ['XLK', 'XLF', 'XLE', 'XLV', 'XLI', 'XLY'],
        risk: ['VIX', 'TNX', 'DXY', 'GLD']
    };
