<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <title>KINETIC 2.1 — Market Intelligence Terminal</title>
    <style>
    * { box-sizing: border-box; margin: 0; padding: 0 }
    :root {
        --bg: #0b0e11;
        --surface: #14171a;
        --border: rgba(255,255,255,0.06);
        --border2: rgba(255,255,255,0.1);
        --green: #00ffaa;
        --red: #ff3355;
        --blue: #58a6ff;
        --amber: #ffcc00;
        --text: #ffffff;
        --muted: #707a8a;
        --dim: #8b94a3;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; font-size: 13px }
    button { font-family: inherit; cursor: pointer }
    
    .topbar { display: flex; justify-content: space-between; align-items: center; padding: 12px 24px; background: var(--surface); border-bottom: 1px solid var(--border2); position: sticky; top: 0; z-index: 99 }
    .logo-box { display: flex; align-items: center; gap: 10px }
    .logo-icon { width: 32px; height: 32px; background: #1a1e23; border-radius: 6px; display: flex; align-items: flex-end; justify-content: center; gap: 3px; padding-bottom: 6px }
    
    .nav-shell { display: flex; background: var(--surface); border-bottom: 1px solid var(--border2); padding: 0 24px; position: sticky; top: 57px; z-index: 98 }
    .nav-tab { padding: 14px 20px; font-size: 10px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); background: none; border: none; border-bottom: 2px solid transparent; transition: .2s }
    .nav-tab.active { color: var(--green); border-bottom-color: var(--green) }

    .main-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 12px; padding: 16px 24px }
    .card { background: var(--surface); border: 1px solid var(--border2); border-radius: 12px; overflow: hidden }
    .ch { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center }
    .ct { font-size: 10px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 1px }
    .cb { padding: 8px 16px 16px }

    /* HEATMAP STYLES */
    .heat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 4px; padding: 10px }
    .heat-cell { height: 80px; border-radius: 4px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 700; transition: transform 0.2s }
    .heat-cell:hover { transform: scale(1.05); z-index: 2; cursor: pointer }
    .heat-sym { font-size: 14px; margin-bottom: 4px }
    .heat-val { font-size: 10px; opacity: 0.8 }

    .hidden { display: none }
    .badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 4px }
    .g { color: var(--green); background: rgba(0,255,170,0.1) }
    .r { color: var(--red); background: rgba(255,51,85,0.1) }
    </style>
</head>
<body>

<div class="topbar">
    <div class="logo-box">
        <div class="logo-icon">
            <div style="width:4px;height:10px;background:#3b66f5;border-radius:1px"></div>
            <div style="width:4px;height:18px;background:#4ba1ff;border-radius:1px"></div>
            <div style="width:4px;height:24px;background:#00ffaa;border-radius:1px"></div>
        </div>
        <div style="display:flex;flex-direction:column;line-height:1">
            <b style="font-size:16px;letter-spacing:2px">KINETIC</b>
            <span style="font-size:9px;color:var(--muted);text-transform:uppercase">Intelligence Terminal</span>
        </div>
    </div>
    <div id="regime-status" class="badge g">Analyzing...</div>
</div>

<nav class="nav-shell">
    <button class="nav-tab active" onclick="tab('macro')">Macro</button>
    <button class="nav-tab" onclick="tab('sectors')">Sectors</button>
    <button class="nav-tab" onclick="tab('heatmap')">Heat Map</button>
    <button class="nav-tab" onclick="tab('compare')">Compare</button>
</nav>

<div id="view-macro" class="main-grid">
    <div class="card">
        <div class="ch"><span class="ct">Market Velocity</span></div>
        <div class="cb" id="macro-list">Loading...</div>
    </div>
</div>

<div id="view-sectors" class="main-grid hidden">
    <div id="sector-grid" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap:12px; width:100%"></div>
</div>

<div id="view-heatmap" class="main-grid hidden" style="grid-template-columns: 1fr">
    <div class="card">
        <div class="ch"><span class="ct">Momentum Heat Map (Z-Score Relative)</span></div>
        <div class="heat-grid" id="heatmap-container"></div>
    </div>
</div>

<div id="view-compare" class="main-grid hidden" style="grid-template-columns: 1fr">
    <div class="card">
        <div class="ch"><span class="ct">Ticker Analysis</span></div>
        <div class="cb">
            <input type="text" id="symbol-in" placeholder="ENTER TICKER" style="background:#0b0e11; border:1px solid var(--green); color:var(--green); padding:10px; border-radius:8px; width:200px; text-transform:uppercase">
            <button onclick="analyzeTicker()" style="background:var(--green); color:#000; border:none; padding:10px 20px; border-radius:8px; font-weight:700; margin-left:10px">Run Audit</button>
            <div id="scorer-results" style="margin-top:20px"></div>
        </div>
    </div>
</div>

<script>
    const CONFIG = {
        tickers: ['SPY','QQQ','IWM','DIA','XLK','XLF','XLV','XLE','XLI','XLY','XLP','XLU','XLB','XLRE','XLC','GLD','TLT','USO','BITO'],
        sectors: ['XLK','XLF','XLV','XLE','XLI','XLY','XLP','XLU','XLB','XLRE','XLC']
    };

    function calcZ(prices) {
        if (prices.length < 10) return 0;
        const vels = [];
        for (let i = 1; i < prices.length; i++) vels.push(((prices[i]-prices[i-1])/prices[i-1])*100);
        const avg = vels.reduce((a,b)=>a+b,0)/vels.length;
        const std = Math.sqrt(vels.reduce((a,b)=>a+(b-avg)**2,0)/vels.length)||1;
        return ((vels[vels.length-1]-avg)/std).toFixed(2);
    }

    async function getPrices(sym) {
        try {
            const r = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d&range=1mo`);
            const d = await r.json();
            return d.chart.result[0].indicators.quote[0].close.filter(p => p != null);
        } catch (e) { return []; }
    }

    function tab(name) {
        document.querySelectorAll('.main-grid').forEach(el => el.classList.add('hidden'));
        document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
        document.getElementById(`view-${name}`).classList.remove('hidden');
        event.target.classList.add('active');
        if(name === 'heatmap') renderHeatmap();
    }

    async function renderHeatmap() {
        const container = document.getElementById('heatmap-container');
        container.innerHTML = 'Calculating thermals...';
        let html = '';
        for (const s of CONFIG.tickers) {
            const p = await getPrices(s);
            const z = calcZ(p);
            const intensity = Math.min(Math.abs(z) * 0.4, 1);
            const color = z > 0 ? `rgba(0, 255, 170, ${intensity})` : `rgba(255, 51, 85, ${intensity})`;
            html += `<div class="heat-cell" style="background:${color}; border:1px solid rgba(255,255,255,0.1)">
                        <div class="heat-sym">${s}</div>
                        <div class="heat-val">${z}σ</div>
                     </div>`;
        }
        container.innerHTML = html;
    }

    async function init() {
        const list = document.getElementById('macro-list');
        let html = '';
        for (const s of ['SPY','QQQ','IWM','VIX']) {
            const p = await getPrices(s);
            const z = calcZ(p);
            html += `<div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border)">
                        <span>${s}</span><span class="badge ${z>0?'g':'r'}">${z}σ</span>
                     </div>`;
        }
        list.innerHTML = html;
    }

    window.onload = init;
</script>
</body>
</html>
