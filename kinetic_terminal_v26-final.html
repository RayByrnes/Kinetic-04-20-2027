<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0e11;--sf:#14171a;--br:rgba(255,255,255,0.07);
  --gr:#00ffaa;--rd:#ff3355;--am:#ffcc00;--bl:#58a6ff;
  --mu:#707a8a;--dm:#8b94a3;--tx:#fff;
}
body{background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;
     height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── TOP BAR ── */
#topbar{
  display:flex;align-items:stretch;background:var(--sf);
  border-bottom:1px solid var(--br);flex-shrink:0;min-height:44px;
}
#logo{
  display:flex;align-items:center;gap:9px;padding:0 18px;
  border-right:1px solid var(--br);flex-shrink:0;
}
.lb{border-radius:2px;flex-shrink:0}
.lb1{width:3px;height:7px;background:#3b66f5}
.lb2{width:3px;height:12px;background:#4ba1ff}
.lb3{width:3px;height:18px;background:#00ffaa}
#logo-icon{width:26px;height:26px;background:#1a1e23;border-radius:5px;
  display:flex;align-items:flex-end;justify-content:center;gap:2px;padding-bottom:4px}
#logo-text{font-size:13px;font-weight:900;letter-spacing:3px}
#logo-sub{font-size:8px;letter-spacing:2px;color:var(--mu);text-transform:uppercase}

/* ── INDEX TABS ── */
#idx-tabs{display:flex;align-items:stretch;border-right:1px solid var(--br)}
.itab{
  padding:0 16px;font-size:10px;font-weight:700;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--mu);cursor:pointer;
  border:none;background:none;border-bottom:2px solid transparent;
  transition:.15s;white-space:nowrap;font-family:inherit;
}
.itab:hover{color:var(--tx)} .itab.on{color:var(--gr);border-bottom-color:var(--gr)}

/* ── SECTOR PILLS ── */
#sec-bar{
  display:flex;align-items:center;gap:5px;padding:0 12px;
  flex:1;overflow-x:auto;border-right:1px solid var(--br);
}
#sec-bar::-webkit-scrollbar{height:2px}
#sec-bar::-webkit-scrollbar-thumb{background:var(--br)}
.spill{
  padding:3px 10px;font-size:9px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;border:1px solid var(--br);border-radius:20px;
  color:var(--mu);background:none;cursor:pointer;white-space:nowrap;
  transition:.15s;font-family:inherit;flex-shrink:0;
}
.spill:hover{color:var(--tx);border-color:rgba(255,255,255,.25)}
.spill.on{color:var(--bg);background:var(--gr);border-color:var(--gr)}

/* ── RIGHT CONTROLS ── */
#ctrl-right{display:flex;align-items:center;gap:10px;padding:0 14px;flex-shrink:0}
.cbtn{
  padding:3px 10px;font-size:9px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;border:1px solid var(--br);border-radius:4px;
  color:var(--mu);background:none;cursor:pointer;font-family:inherit;transition:.15s;
}
.cbtn:hover,.cbtn.on{color:var(--gr);border-color:var(--gr);background:rgba(0,255,170,.05)}

/* ── LEGEND + SLIDER ── */
#legend-wrap{
  display:flex;flex-direction:column;gap:4px;
  border-left:1px solid var(--br);padding:6px 14px;
  flex-shrink:0;min-width:220px;justify-content:center;
}
#legend-row{display:flex;align-items:center;gap:6px;font-size:9px;color:var(--mu);letter-spacing:1px}
#leg-bull{color:var(--gr);font-weight:700;font-size:9px}
#leg-bear{color:var(--rd);font-weight:700;font-size:9px}
#leg-bar{
  flex:1;height:7px;border-radius:4px;
  background:linear-gradient(90deg,#006400,#2E7D32,#1a2535,#8B1A1A,#8B0000);
}
/* slider row */
#slider-row{display:flex;align-items:center;gap:6px;font-size:9px;color:var(--mu)}
#zslider{
  flex:1;-webkit-appearance:none;appearance:none;
  height:4px;border-radius:2px;outline:none;cursor:pointer;
  background:linear-gradient(90deg,rgba(0,255,170,0.3),rgba(255,255,255,0.1),rgba(255,51,85,0.3));
}
#zslider::-webkit-slider-thumb{
  -webkit-appearance:none;width:14px;height:14px;
  border-radius:50%;background:#fff;border:2px solid var(--gr);
  cursor:pointer;transition:.15s;
}
#zslider::-webkit-slider-thumb:hover{border-color:var(--am);transform:scale(1.2)}
#slider-label{
  font-family:'IBM Plex Mono',monospace;font-size:9px;
  font-weight:700;color:var(--am);min-width:52px;text-align:center;
}

/* ── BREADCRUMB ── */
#bc{
  padding:4px 16px;font-family:'IBM Plex Mono',monospace;
  font-size:10px;color:var(--mu);letter-spacing:1px;
  background:rgba(255,255,255,0.015);border-bottom:1px solid var(--br);
  flex-shrink:0;display:flex;align-items:center;gap:6px;
}
#bc-sec{color:var(--gr)}
#bc-reset{
  margin-left:auto;padding:2px 9px;font-size:9px;font-weight:700;
  text-transform:uppercase;letter-spacing:1px;
  border:1px solid var(--br);border-radius:3px;
  color:var(--mu);background:none;cursor:pointer;font-family:inherit;transition:.15s;
}
#bc-reset:hover{color:var(--gr);border-color:var(--gr)}

/* ── MAP ── */
#mapwrap{flex:1;overflow:hidden;position:relative}
#hsvg{width:100%;height:100%;display:block}

/* ── STATUS BAR ── */
#sbar{
  display:flex;align-items:center;gap:12px;padding:4px 16px;
  border-top:1px solid var(--br);flex-shrink:0;
  font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--mu);
}
.sbi{display:flex;align-items:center;gap:4px}
.sbv{font-weight:700}
.sbsp{width:1px;height:12px;background:var(--br)}

/* ── TOOLTIP ── */
#tip{
  position:fixed;background:#14171a;
  border:1px solid rgba(255,255,255,0.12);border-radius:8px;
  padding:11px 14px;font-family:'IBM Plex Mono',monospace;font-size:11px;
  pointer-events:none;opacity:0;transition:opacity .1s;z-index:999;
  min-width:178px;box-shadow:0 8px 32px rgba(0,0,0,0.7);
}
#tip.vis{opacity:1}
.tt{font-size:15px;font-weight:700;color:#fff;margin-bottom:3px}
.tn{font-size:9px;color:var(--mu);letter-spacing:1px;margin-bottom:9px;font-family:'Inter',sans-serif}
.tr{display:flex;justify-content:space-between;gap:16px;margin-bottom:2px;font-size:10px}
.tl{color:var(--mu)}.tv{color:#fff;font-weight:600}

/* ── SVG TEXT ── */
.tkr{font-family:'IBM Plex Mono',monospace;font-weight:700;fill:rgba(255,255,255,0.92);pointer-events:none;dominant-baseline:hanging}
.zscore{font-family:'IBM Plex Mono',monospace;font-weight:400;pointer-events:none}
.pr{font-family:'IBM Plex Mono',monospace;font-weight:300;fill:rgba(255,255,255,0.5);pointer-events:none}
.chg{font-family:'IBM Plex Mono',monospace;font-weight:400;pointer-events:none}
.seclbl{font-family:'Inter',sans-serif;font-size:9px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;fill:rgba(255,255,255,0.28);pointer-events:none;dominant-baseline:hanging}
.tile-bg{cursor:pointer;transition:filter .12s}
.tile-bg:hover{filter:brightness(1.3)}
</style>
</head>

// ════════════════════════════════════════════════════════════
// COLOR
// ════════════════════════════════════════════════════════════
function zCol(z) {
  // Bull = left = green, Bear = right = red
  if (z >= 3)   return '#006400';
  if (z >= 2)   return '#2E7D32';
  if (z >= 1)   return '#388E3C';
  if (z >= 0.5) return '#1B5E20';
  if (z >= 0)   return '#1a2535';
  if (z >= -0.5)return '#3a1520';
  if (z >= -1)  return '#6B1A1A';
  if (z >= -2)  return '#8B1A1A';
  if (z >= -3)  return '#A31515';
  return '#8B0000';
}
function chgCol(c) {
  if (c >= 3)  return '#006400';
  if (c >= 1)  return '#2E7D32';
  if (c >= 0)  return '#1a2535';
  if (c >= -1) return '#6B1A1A';
  if (c >= -3) return '#8B1A1A';
  return '#8B0000';
}
function getCol(d) { return CMODE === 'z' ? zCol(d.data.z) : chgCol(d.data.c); }

// ════════════════════════════════════════════════════════════
// FILTER DATA
// ════════════════════════════════════════════════════════════
function getData() {
  var raw = STOCKS[IDX] || [];
  if (SEC !== 'ALL') raw = raw.filter(function(d) { return d.s === SEC; });
  // Slider filter: ZFILT > 0 = show bulls (z >= threshold), < 0 = show bears (z <= -threshold)
  if (ZFILT > 0) {
    var thresh = ZFILT / 50; // 0-100 maps to 0-2 z-score threshold
    raw = raw.filter(function(d) { return d.z >= thresh; });
  } else if (ZFILT < 0) {
    var thresh2 = ZFILT / 50; // negative
    raw = raw.filter(function(d) { return d.z <= thresh2; });
  }
  return raw;
}

function buildHier(data) {
  var secs = {};
  data.forEach(function(d) {
    if (!secs[d.s]) secs[d.s] = { name: d.s, children: [] };
    secs[d.s].children.push(Object.assign({}, d, { value: EQSIZE ? 1 : d.mc }));
  });
  return { name: 'root', children: Object.values(secs) };
}

// ════════════════════════════════════════════════════════════
// SECTOR PILLS
// ════════════════════════════════════════════════════════════
function buildPills() {
  var all = STOCKS[IDX] || [];
  var sectors = ['ALL'];
  var seen = {};
  all.forEach(function(d) { if (!seen[d.s]) { seen[d.s] = 1; sectors.push(d.s); } });
  var bar = document.getElementById('sec-bar');
  bar.innerHTML = '';
  sectors.forEach(function(s) {
    var btn = document.createElement('button');
    btn.className = 'spill' + (s === SEC ? ' on' : '');
    btn.textContent = s === 'ALL' ? 'All Sectors' : s;
    btn.onclick = function() { setSec(s); };
    bar.appendChild(btn);
  });
}

// ════════════════════════════════════════════════════════════
// DRAW
// ════════════════════════════════════════════════════════════
function draw() {
  var svgEl = document.getElementById('hsvg');
  if (!svgEl) return;
  var svg = d3.select('#hsvg');
  svg.selectAll('*').remove();

  var W = svgEl.parentElement ? svgEl.parentElement.clientWidth  : window.innerWidth;
  var H = svgEl.parentElement ? svgEl.parentElement.clientHeight : window.innerHeight - 130;
  if (W <= 0 || H <= 0) return;
  svg.attr('width', W).attr('height', H);

  var data = getData();
  if (!data.length) {
    svg.append('text')
      .attr('x', W/2).attr('y', H/2)
      .attr('text-anchor','middle').attr('fill','#707a8a')
      .attr('font-size', 14).attr('font-family','Inter,sans-serif')
      .text('No stocks match current filter — slide toward center');
    updateStatus([], data.length);
    return;
  }

  var singleSec = SEC !== 'ALL';
  var root = d3.hierarchy(buildHier(data))
    .sum(function(d) { return d.value || 0; })
    .sort(function(a, b) { return b.value - a.value; });

  d3.treemap()
    .size([W, H])
    .tile(d3.treemapSquarify)
    .paddingOuter(singleSec ? 2 : 3)
    .paddingInner(singleSec ? 1 : 1.5)
    .paddingTop(singleSec ? 0 : 20)
    (root);

  // Sector overlays
  if (!singleSec && root.children) {
    root.children.forEach(function(sec) {
      var sw = sec.x1 - sec.x0, sh = sec.y1 - sec.y0;
      svg.append('rect')
        .attr('x', sec.x0).attr('y', sec.y0)
        .attr('width', sw).attr('height', sh)
        .attr('fill','rgba(255,255,255,0.015)')
        .attr('stroke','rgba(255,255,255,0.09)')
        .attr('stroke-width', 1).attr('rx', 2)
        .style('cursor','pointer')
        .on('click', function() { setSec(sec.data.name); });
      if (sw > 45) {
        svg.append('text')
          .attr('class','seclbl')
          .attr('x', sec.x0 + 5).attr('y', sec.y0 + 5)
          .text(sec.data.name
            .replace('Information Technology','Info Tech')
            .replace('Communication Services','Comm Svcs')
            .replace('Consumer Discretionary','Cons Disc')
            .replace('Consumer Staples','Cons Stpls'));
      }
    });
  }

  // Tiles
  var leaves = root.leaves();
  var g = svg.selectAll('.tile')
    .data(leaves).enter()
    .append('g').attr('class','tile')
    .style('cursor','pointer')
    .on('mousemove', showTip)
    .on('mouseleave', hideTip)
    .on('click', function(e, d) { if (SEC === 'ALL') setSec(d.data.s); });

  g.append('rect')
    .attr('class','tile-bg')
    .attr('x',      function(d) { return d.x0 + 0.5; })
    .attr('y',      function(d) { return d.y0 + 0.5; })
    .attr('width',  function(d) { return Math.max(0, d.x1 - d.x0 - 1); })
    .attr('height', function(d) { return Math.max(0, d.y1 - d.y0 - 1); })
    .attr('fill',   function(d) { return getCol(d); })
    .attr('rx', 2)
    .attr('stroke','rgba(0,0,0,0.22)')
    .attr('stroke-width', 0.5);

  g.each(function(d) {
    var el = d3.select(this);
    var tw = d.x1 - d.x0, th = d.y1 - d.y0;
    var pad = 4, x0 = d.x0 + pad, y0 = d.y0 + pad;
    if (tw < 24 || th < 14) return;
    var fs = Math.min(Math.max(tw / 5.5, 8), tw > 90 ? 15 : 11);
    el.append('text').attr('class','tkr')
      .attr('x', x0).attr('y', y0).attr('font-size', fs).text(d.data.t);
    if (th < 30 || tw < 42) return;
    var zv = d.data.z, zc = zv >= 0 ? '#00ffaa' : '#ff7799';
    el.append('text').attr('class','zscore')
      .attr('x', x0).attr('y', y0 + fs + 2)
      .attr('font-size', Math.min(fs * 0.72, 10))
      .attr('fill', zc)
      .text('Z ' + (zv >= 0 ? '+' : '') + zv.toFixed(1));
    if (th < 52 || tw < 62) return;
    el.append('text').attr('class','pr')
      .attr('x', x0).attr('y', d.y1 - pad - 1)
      .attr('font-size', Math.min(fs * 0.62, 9))
      .text('$' + (d.data.p >= 1000 ? (d.data.p/1000).toFixed(1)+'k' : d.data.p.toFixed(0)));
    var cc = d.data.c >= 0 ? '#00ffaa' : '#ff3355';
    el.append('text').attr('class','chg')
      .attr('x', d.x1 - pad).attr('y', d.y1 - pad - 1)
      .attr('font-size', Math.min(fs * 0.62, 9))
      .attr('text-anchor','end').attr('fill', cc)
      .text((d.data.c >= 0 ? '+' : '') + d.data.c.toFixed(1) + '%');
  });

  updateStatus(data, data.length);
}

function updateStatus(data, shown) {
  var all = STOCKS[IDX] || [];
  var adv = data.filter(function(d) { return d.z > 0; }).length;
  var dec = data.filter(function(d) { return d.z < 0; }).length;
  var avgZ = data.length ? (data.reduce(function(s,d) { return s+d.z; },0)/data.length).toFixed(2) : '—';
  var maxZ = data.length ? Math.max.apply(null, data.map(function(d) { return d.z; })).toFixed(1) : '—';
  var minZ = data.length ? Math.min.apply(null, data.map(function(d) { return d.z; })).toFixed(1) : '—';
  document.getElementById('sb-uni').textContent  = IDX_NAMES[IDX] || IDX;
  document.getElementById('sb-show').textContent = shown + ' of ' + all.length;
  document.getElementById('sb-adv').textContent  = adv;
  document.getElementById('sb-dec').textContent  = dec;
  var el = document.getElementById('sb-avgz');
  el.textContent = (parseFloat(avgZ) >= 0 ? '+' : '') + avgZ;
  el.style.color = parseFloat(avgZ) >= 0 ? 'var(--gr)' : 'var(--rd)';
  document.getElementById('sb-maxz').textContent = maxZ !== '—' ? '+' + maxZ : '—';
  document.getElementById('sb-minz').textContent = minZ;
}

// ════════════════════════════════════════════════════════════
// TOOLTIP
// ════════════════════════════════════════════════════════════
var tipEl = document.getElementById('tip');
function showTip(event, d) {
  var zv = d.data.z, cv = d.data.c;
  var zc = zv >= 0 ? 'var(--gr)' : '#ff7799';
  var cc = cv >= 0 ? 'var(--gr)' : 'var(--rd)';
  document.getElementById('tt').textContent  = d.data.t;
  document.getElementById('tn').textContent  = d.data.n;
  var tzEl = document.getElementById('tz');
  tzEl.textContent = (zv >= 0 ? '+' : '') + zv.toFixed(2);
  tzEl.style.color = zc;
  document.getElementById('tp').textContent  = '$' + d.data.p.toFixed(2);
  var tcEl = document.getElementById('tc');
  tcEl.textContent = (cv >= 0 ? '+' : '') + cv.toFixed(2) + '%';
  tcEl.style.color = cc;
  document.getElementById('tmc').textContent = '$' + d.data.mc + 'B';
  document.getElementById('tsec').textContent = d.data.s;
  var tx = Math.min(event.clientX + 14, window.innerWidth  - 200);
  var ty = Math.min(event.clientY - 10, window.innerHeight - 200);
  tipEl.style.left = tx + 'px';
  tipEl.style.top  = ty + 'px';
  tipEl.classList.add('vis');
}
function hideTip() { tipEl.classList.remove('vis'); }

// ════════════════════════════════════════════════════════════
// CONTROLS
// ════════════════════════════════════════════════════════════
function setIdx(idx, btn) {
  IDX = idx; SEC = 'ALL'; ZFILT = 0;
  document.getElementById('zslider').value = 0;
  document.getElementById('slider-label').textContent = 'All stocks';
  document.querySelectorAll('.itab').forEach(function(b) { b.classList.remove('on'); });
  if (btn) btn.classList.add('on');
  document.getElementById('bc-idx').textContent  = IDX_NAMES[idx] || idx;
  document.getElementById('bc-sec').textContent  = 'All Sectors';
  buildPills();
  draw();
}

function setSec(s) {
  SEC = s;
  document.querySelectorAll('.spill').forEach(function(b) {
    b.classList.toggle('on', b.textContent === (s === 'ALL' ? 'All Sectors' : s));
  });
  document.getElementById('bc-sec').textContent = s === 'ALL' ? 'All Sectors' : s;
  draw();
}

function doReset() {
  SEC = 'ALL'; ZFILT = 0;
  document.getElementById('zslider').value = 0;
  document.getElementById('slider-label').textContent = 'All stocks';
  buildPills();
  draw();
}

function setColor(mode, btn) {
  CMODE = mode;
  document.querySelectorAll('.cbtn').forEach(function(b) {
    if (b.id === 'cbz' || b.id === 'cbc') b.classList.remove('on');
  });
  if (btn) btn.classList.add('on');
  draw();
}

function toggleEq(btn) {
  EQSIZE = !EQSIZE;
  btn.classList.toggle('on', EQSIZE);
  btn.textContent = EQSIZE ? 'Equal Size' : 'By MCap';
  draw();
}

function onSlider(val) {
  ZFILT = parseInt(val, 10);
  var lbl;
  if (ZFILT === 0) {
    lbl = 'All stocks';
    document.getElementById('slider-label').style.color = 'var(--am)';
  } else if (ZFILT > 0) {
    var thresh = (ZFILT / 50).toFixed(1);
    lbl = 'Bull Z > +' + thresh;
    document.getElementById('slider-label').style.color = 'var(--gr)';
  } else {
    var thresh2 = (ZFILT / 50).toFixed(1);
    lbl = 'Bear Z < ' + thresh2;
    document.getElementById('slider-label').style.color = 'var(--rd)';
  }
  document.getElementById('slider-label').textContent = lbl;
  draw();
}

// ════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════
buildPills();
draw();
window.addEventListener('resize', draw);
</script>
