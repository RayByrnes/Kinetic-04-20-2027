<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <title>KINETIC 2.0 — Market Intelligence Terminal</title>
    <style>
    * { box-sizing: border-box; margin: 0; padding: 0 }
    :root {
        --bg: #0b0e11;
        --surface: #14171a;
        --border: rgba(255,255,255,0.06);
        --border2: rgba(255,255,255,0.1);
        --green: #00ffaa;
        --red: #ff3355;
        --text: #ffffff;
        --muted: #707a8a;
        --dim: #8b94a3;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; font-size: 13px; overflow-x: hidden }
    
    .topbar { display: flex; justify-content: space-between; align-items: center; padding: 12px 24px; background: var(--surface); border-bottom: 1px solid var(--border2); position: sticky; top: 0; z-index: 100 }
    .logo-box { display: flex; align-items: center; gap: 10px }
    
    /* NAVIGATION BOLT-ON */
    .nav-bar { display: flex; background: var(--surface); border-bottom: 1px solid var(--border2); padding: 0 24px; gap: 8px }
    .nav-btn { background: none; border: none; padding: 14px 20px; color: var(--muted); font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; cursor: pointer; border-bottom: 2px solid transparent }
    .nav-btn.active { color: var(--green); border-bottom-color: var(--green) }

    .status-group { display: flex; gap: 12px }
    .pill { background: var(--bg); border: 1px solid var(--border2); border-radius: 20px; padding: 4px 12px; font-size: 11px; font-weight: 600; color: var(--dim); display: flex; align-items: center; gap: 6px }
    .pill.active { border-color: rgba(0,255,170,0.3); color: var(--green); background: rgba(0,255,170,0.06) }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor }

    /* LAYOUTS */
    .terminal-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 12px; padding: 16px 24px }
    .card { background: var(--surface); border: 1px solid var(--border2); border-radius: 12px; overflow: hidden }
    .ch { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center }
    .ct { font-size: 10px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 1.2px }
    .cb { padding: 8px 16px 16px }

    /* HEATMAP STYLES */
    .heat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 6px; padding: 20px }
    .heat-cell { height: 80px; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 700; transition: transform 0.2s }
    .heat-cell:hover { transform: scale(1.05); z-index: 2 }
    .heat-sym { font-family: 'IBM Plex Mono'; font-size: 14px; margin-bottom: 2px }
    .heat-val { font-size: 10px; opacity: 0.8 }

    .row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border) }
    .sym { font-family: 'IBM Plex Mono', monospace; font-weight: 700; font-size: 14px }
    .physics { font-size: 10px; font-weight: 800; padding: 2px 6px; border-radius: 4px; text-transform: uppercase }
    
    .up { color: var(--green) } .dn { color: var(--red) }
    .bg-up { background: rgba(0,255,170,0.1); color: var(--green) }
    .bg-dn { background: rgba(255,51,85,0.1); color: var(--red) }
    .hidden { display: none }
    </style>
</head>
<body>

<div class="topbar">
    <div class="logo-box">
        <b style="font-size:16px;letter-spacing:2px">KINETIC 2.0</b>
    </div>
    <div class="status-group">
        <div class="pill active"><span class="dot"></span><span id="market-status">REGIME: BULLISH</span></div>
        <div class="pill"><span class="dot"></span><span id="market-phase">SCANNING...</span></div>
    </div>
</div>

<nav class="nav-bar">
    <button class="nav-btn active" onclick="switchTab('terminal')">Main Terminal</button>
    <button class="nav-btn" onclick="switchTab('heatmap')">Heat Map</button>
</nav>

<div id="view-terminal" class="terminal-grid">
    <div class="card">
        <div class="ch"><span class="ct">Macro Velocity</span></div>
        <div class="cb" id="macro-list"><div class="row"><span>Initializing...</span></div></div>
    </div>
    <div class="card">
        <div class="ch"><span class="ct">Sector Strength</span></div>
        <div class="cb" id="sector-list"><div class="row"><span>Initializing...</span></div></div>
    </div>
    <div class="card">
        <div class="ch"><span class="ct">Volatility Pressure</span></div>
        <div class="cb" id="risk-list"><div class="row"><span>Initializing...</span></div></div>
    </div>
</div>

<div id="view-heatmap" class="hidden">
    <div class="heat-grid" id="heatmap-container"></div>
</div>

<script>
    const CONFIG = {
        macro: ['SPY', 'QQQ', 'IWM', 'DIA'],
        sectors: ['XLK', 'XLF', 'XLE', 'XLV', 'XLI', 'XLY'],
        risk: ['VIX', 'TNX', 'DXY', 'GLD'],
        heat: ['AAPL', 'MSFT', 'NVDA', 'TSLA', 'META', 'GOOGL', 'AMZN', 'AMD', 'NFLX', 'COIN', 'BITO', 'MSTR']
    };

    function switchTab(tab) {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        
        if (tab === 'terminal') {
            document.getElementById('view-terminal').classList.remove('hidden');
            document.getElementById('view-heatmap').classList.add('hidden');
        } else {
            document.getElementById('view-terminal').classList.add('hidden');
            document.getElementById('view-heatmap').classList.remove('hidden');
            renderHeatmap();
        }
    }

    async function fetchPhysics(sym) {
        try {
            const r = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d&range=1mo`);
            const d = await r.json();
            const p = d.chart.result[0].indicators.quote[0].close.filter(x => x != null);
            const v = ((p[p.length-1]-p[p.length-5])/p[p.length-5]*100);
            const prevV = ((p[p.length-2]-p[p.length-6])/p[p.length-6]*100);
            const a = v - prevV;
            return { sym, v: v.toFixed(2), a: a.toFixed(2) };
        } catch (e) { return null; }
    }

    async function renderHeatmap() {
        const container = document.getElementById('heatmap-container');
        container.innerHTML = '<div style="padding:20px; color:var(--green)">Calculating Thermals...</div>';
        let html = '';
        for (const s of CONFIG.heat) {
            const data = await fetchPhysics(s);
            if (!data) continue;
            const intensity = Math.min(Math.abs(data.v) * 0.2, 0.8);
            const color = data.v >= 0 ? `rgba(0, 255, 170, ${intensity})` : `rgba(255, 51, 85, ${intensity})`;
            html += `<div class="heat-cell" style="background:${color}; border: 1px solid rgba(255,255,255,0.1)">
                        <div class="heat-sym">${s}</div>
                        <div class="heat-val">${data.v}%</div>
                     </div>`;
        }
        container.innerHTML = html;
    }

    async function renderSection(id, list) {
        const container = document.getElementById(id);
        let html = '';
        for (const sym of list) {
            const data = await fetchPhysics(sym);
            if (!data) continue;
            html += `<div class="row">
                <span class="sym">${sym}</span>
                <div style="display:flex; align-items:center; gap:8px">
                    <span class="${data.v>=0?'up':'dn'}">${data.v}%</span>
                    <span class="physics ${data.a>=0?'bg-up':'bg-dn'}">${data.a > 0 ? 'ACCEL' : 'DECEL'}</span>
                </div>
            </div>`;
        }
        container.innerHTML = html;
    }

    function init() {
        renderSection('macro-list', CONFIG.macro);
        renderSection('sector-list', CONFIG.sectors);
        renderSection('risk-list', CONFIG.risk);
    }

    init();
</script>
</body>
</html>
