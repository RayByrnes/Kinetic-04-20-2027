<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KINETIC // TERMINAL</title>
    <style>
        body { background: #0b0e11; color: white; font-family: sans-serif; padding: 30px; margin: 0; }
        .header { border-bottom: 1px solid #2d333b; padding-bottom: 15px; margin-bottom: 30px; font-weight: 900; letter-spacing: 2px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
        .card { background: #14171a; border: 1px solid #2d333b; border-radius: 12px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .label { color: #707a8a; font-size: 10px; font-weight: 800; text-transform: uppercase; margin-bottom: 15px; letter-spacing: 1px; }
        .row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #1c2126; font-family: monospace; }
        .up { color: #00ffaa; } .dn { color: #ff3355; }
    </style>
</head>
<body>
    <div class="header">KINETIC <span style="color:#444;">//</span> TERMINAL_V2</div>
    <div class="grid">
        <div class="card"><div class="label">Macro</div><div id="m"></div></div>
        <div class="card"><div class="label">Sectors</div><div id="s"></div></div>
        <div class="card"><div class="label">Risk</div><div id="r"></div></div>
    </div>
    <script>
        const syms = { m:['SPY','QQQ','IWM'], s:['XLK','XLE','XLF'], r:['VIX','TNX','DXY'] };
        async function get(s) {
            try {
                const r = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${s}?interval=1d&range=5d`);
                const d = await r.json();
                const p = d.chart.result[0].indicators.quote[0].close.filter(x=>x!=null);
                const v = ((p[p.length-1]-p[0])/p[0]*100).toFixed(2);
                return `<div class="row"><span>${s}</span><span class="${v>=0?'up':'dn'}">${v}%</span></div>`;
            } catch(e) { return ''; }
        }
        Object.keys(syms).forEach(async k => {
            let h = ''; for(const s of syms[k]) { h += await get(s); }
            document.getElementById(k).innerHTML = h;
        });
    </script>
</body>
</html>
