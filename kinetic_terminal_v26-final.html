<!DOCTYPE html>

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0b0e11;
            color: #fff;
            font-family: 'IBM Plex Sans', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        #header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            flex-shrink: 0;
        }

        #header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        #logo {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 3px;
            color: #00ffaa;
            text-transform: uppercase;
        }

        #subtitle {
            font-size: 10px;
            letter-spacing: 2px;
            color: #707a8a;
            text-transform: uppercase;
        }

        #controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .ctrl-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #8b94a3;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            letter-spacing: 1px;
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s;
            text-transform: uppercase;
        }
        .ctrl-btn:hover, .ctrl-btn.active {
            background: rgba(0,255,170,0.1);
            border-color: #00ffaa;
            color: #00ffaa;
        }

        #legend {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 9px;
            color: #707a8a;
            letter-spacing: 1px;
        }

        #legend-bar {
            width: 120px;
            height: 8px;
            border-radius: 4px;
            background: linear-gradient(90deg, #8B0000, #1a2535, #006400);
        }

        #timestamp {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            color: #707a8a;
        }

        /* ── Treemap container ── */
        #map-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        #treemap {
            width: 100%;
            height: 100%;
        }

        .sector-label {
            font-family: 'IBM Plex Sans', sans-serif;
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            fill: rgba(255,255,255,0.35);
            pointer-events: none;
            dominant-baseline: hanging;
        }

        .tile-ticker {
            font-family: 'IBM Plex Mono', monospace;
            font-weight: 700;
            fill: rgba(255,255,255,0.92);
            pointer-events: none;
            dominant-baseline: hanging;
        }

        .tile-z {
            font-family: 'IBM Plex Mono', monospace;
            font-weight: 400;
            pointer-events: none;
        }

        .tile-price {
            font-family: 'IBM Plex Mono', monospace;
            font-weight: 300;
            fill: rgba(255,255,255,0.55);
            pointer-events: none;
        }

        .tile-chg {
            font-family: 'IBM Plex Mono', monospace;
            font-weight: 400;
            pointer-events: none;
        }

        /* ── Tooltip ── */
        #tooltip {
            position: fixed;
            background: #14171a;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            padding: 12px 14px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.1s;
            z-index: 1000;
            min-width: 180px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
        }

        #tooltip.visible { opacity: 1; }

        .tt-ticker {

            font-weight: 700;
            color: #fff;
            margin-bottom: 4px;
        }

        .tt-name {

            color: #707a8a;
            letter-spacing: 1px;
            margin-bottom: 10px;
            font-family: 'IBM Plex Sans', sans-serif;

        .tt-row {

            justify-content: space-between;
            gap: 20px;
            margin-bottom: 3px;
            font-size: 10px;
        }

        .tt-label { color: #707a8a; }

let colorMode = 'z';
let currentSector = null;

const SECTOR_ORDER = [
    'Info Tech','Comm Services','Consumer Disc','Financials',
    'Health Care','Industrials','Energy','Consumer Staples',
    'Utilities','Materials','Real Estate'
];

const SECTOR_ABBR = {
    'Info Tech':'Information Technology',
    'Comm Services':'Communication Services',
    'Consumer Disc':'Consumer Discretionary',
    'Financials':'Financials',
    'Health Care':'Health Care',
    'Industrials':'Industrials',

    'Consumer Staples':'Consumer Staples',
    'Utilities':'Utilities',
    'Materials':'Materials',
    'Real Estate':'Real Estate',
};

// ── Color Logic ──
function zColor(z) {
    if (z >= 2.0) return '#006400';
    if (z >= 1.0) return '#2E7D32';
    if (z >= 0.0) return '#1a2535';
    if (z >= -1.0) return '#6B1A1A';
    return '#8B0000';
}

function chgColor(c) {
    if (c >= 2) return '#006400';
    if (c >= 0) return '#1a2535';
    if (c < 0) return '#8B0000';
}

function getColor(d) {
    return colorMode === 'z' ? zColor(d.data.z) : chgColor(d.data.c);
}

// ── Tree Construction ──
function buildHierarchy(data) {
    const sectors = {};
    data.forEach(d => {
        if (!sectors[d.s]) sectors[d.s] = { name: d.s, children: [] };
        sectors[d.s].children.push({ ...d, value: d.mc });
    });
    return {
        name: 'S&P 500',
        children: SECTOR_ORDER.filter(s => sectors[s]).map(s => sectors[s])
    };
}

const svg = d3.select('#treemap');
let W, H;

function draw(filterSector) {
    svg.selectAll('*').remove();
    W = svg.node().parentElement.clientWidth;
    H = svg.node().parentElement.clientHeight;
    svg.attr('width', W).attr('height', H);

    let data = filterSector ? RAW.filter(d => d.s === filterSector) : RAW;
    const root = d3.hierarchy(buildHierarchy(data)).sum(d => d.value || 0).sort((a, b) => b.value - a.value);

    d3.treemap().size([W, H]).tile(d3.treemapSquarify).paddingOuter(filterSector ? 2 : 4).paddingInner(1).paddingTop(filterSector ? 0 : 22)(root);

    if (!filterSector) {
        root.children.forEach(sec => {
            const g = svg.append('g');
            g.append('rect').attr('x', sec.x0).attr('y', sec.y0).attr('width', sec.x1-sec.x0).attr('height', sec.y1-sec.y0).attr('fill', 'transparent').attr('stroke', 'rgba(255,255,255,0.1)').style('cursor', 'pointer').on('click', () => zoomSector(sec.data.name));
            if (sec.x1-sec.x0 > 60) {
                g.append('text').attr('class', 'sector-label').attr('x', sec.x0+5).attr('y', sec.y0+5).text(SECTOR_ABBR[sec.data.name] || sec.data.name);
            }
        });
    }

    const tiles = svg.selectAll('.tile').data(root.leaves()).enter().append('g').attr('class', 'tile').style('cursor', 'pointer')
        .on('mousemove', showTooltip).on('mouseleave', hideTooltip).on('click', (e, d) => { if (!filterSector) zoomSector(d.data.s); });

    tiles.append('rect').attr('x', d => d.x0+1).attr('y', d => d.y0+1).attr('width', d => Math.max(0, d.x1-d.x0-2)).attr('height', d => Math.max(0, d.y1-d.y0-2)).attr('fill', d => getColor(d)).attr('rx', 2);

    tiles.each(function(d) {
        const g = d3.select(this);
        const tw = d.x1 - d.x0;
        const th = d.y1 - d.y0;
        if (tw < 30 || th < 20) return;
        g.append('text').attr('class', 'tile-ticker').attr('x', d.x0+4).attr('y', d.y0+4).attr('font-size', Math.min(tw/5, 12)).text(d.data.t);
    });

    updateStatus();
}

function updateStatus() {
    const advancing = RAW.filter(d => d.z > 0).length;
    const declining = RAW.filter(d => d.z < 0).length;
    const avgZ = (RAW.reduce((s,d) => s+d.z, 0) / RAW.length).toFixed(2);
    document.getElementById('adv').textContent = advancing;
    document.getElementById('dec').textContent = declining;
    document.getElementById('avg-z').textContent = (avgZ >= 0 ? '+' : '') + avgZ;
}

function zoomSector(s) { currentSector = s; document.getElementById('bc-sector').textContent = SECTOR_ABBR[s] || s; draw(s); }
function resetZoom() { currentSector = null; document.getElementById('bc-sector').textContent = 'All Sectors'; draw(null); }

function showTooltip(event, d) {
    const tt = document.getElementById('tooltip');
    document.getElementById('tt-ticker').textContent = d.data.t;
    document.getElementById('tt-z').textContent = (d.data.z >= 0 ? '+' : '') + d.data.z.toFixed(2);
    document.getElementById('tt-price').textContent = '$' + d.data.p.toFixed(2);
    document.getElementById('tt-chg').textContent = d.data.c.toFixed(2) + '%';
    tt.style.left = (event.clientX + 15) + 'px';
    tt.style.top = (event.clientY - 10) + 'px';
    tt.classList.add('visible');
}

function hideTooltip() { document.getElementById('tooltip').classList.remove('visible'); }

function setColor(mode) { 
    colorMode = mode; 
    document.getElementById('z-btn').classList.toggle('active', mode === 'z');
    document.getElementById('chg-btn').classList.toggle('active', mode === 'chg');
    draw(currentSector); 
}

window.addEventListener('resize', () => draw(currentSector));
draw(null);
setInterval(() => {
    document.getElementById('timestamp').textContent = 'S&P 500 — ' + new Date().toLocaleTimeString();
}, 1000);
</script>
</body>
</html>
