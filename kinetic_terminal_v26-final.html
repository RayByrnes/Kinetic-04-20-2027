<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <title>KINETIC // MARKET TERMINAL</title>
    <style>
        :root {
            --bg: #0b0e11;
            --surface: #14171a;
            --border: rgba(255,255,255,0.06);
            --green: #00ffaa;
            --red: #ff3355;
            --blue: #58a6ff;
            --text: #ffffff;
            --muted: #707a8a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            font-size: 13px;
            line-height: 1.5;
        }

        .header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-weight: 900;
            letter-spacing: 3px;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo span { color: var(--green); }

        .terminal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 1px;
            background-color: var(--border);
            border-bottom: 1px solid var(--border);
        }

        .card {
            background-color: var(--bg);
            padding: 24px;
        }

        .card-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--muted);
            margin-bottom: 16px;
            font-weight: 700;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .ticker { font-family: 'IBM Plex Mono', monospace; font-weight: 600; }
        .val-up { color: var(--green); }
        .val-down { color: var(--red); }

        .physics-badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: 700;
            background: rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">KINETIC <span>//</span> 2.0</div>
    <div id="market-status" style="font-size: 11px; color: var(--muted); font-weight: 600; letter-spacing: 1px;">SYSTEM ACTIVE // REAL-TIME FEED</div>
</div>

<div class="terminal-grid">
    <div class="card">
        <div class="card-label">Core Indices // Momentum</div>
        <div id="indices-list">
            <div class="stat-row"><span class="ticker">SPY</span><span class="val-up">ANALYZING...</span></div>
            <div class="stat-row"><span class="ticker">QQQ</span><span class="val-up">ANALYZING...</span></div>
            <div class="stat-row"><span class="ticker">IWM</span><span class="val-up">ANALYZING...</span></div>
        </div>
    </div>

    <div class="card">
        <div class="card-label">Sector Alpha // Velocity</div>
        <div id="sectors-list">
            <div class="stat-row"><span class="ticker">XLK</span><span class="val-up">--</span></div>
            <div class="stat-row"><span class="ticker">XLF</span><span class="val-up">--</span></div>
            <div class="stat-row"><span class="ticker">XLE</span><span class="val-up">--</span></div>
        </div>
    </div>

    <div class="card">
        <div class="card-label">Risk Signals // Volatility</div>
        <div id="risk-list">
            <div class="stat-row"><span class="ticker">VIX</span><span class="val-down">--</span></div>
            <div class="stat-row"><span class="ticker">TNX</span><span class="val-up">--</span></div>
            <div class="stat-row"><span class="ticker">DXY</span><span class="val-up">--</span></div>
        </div>
    </div>
</div>

<script>
    const tickers = ['SPY', 'QQQ', 'IWM', 'XLK', 'XLF', 'XLE', 'VIX', 'TNX', 'DXY'];

    async function fetchTicker(symbol) {
        try {
            const response = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=5d`);
            const data = await response.json();
            const quote = data.chart.result[0].indicators.quote[0];
            const closes = quote.close.filter(c => c != null);
            const price = closes[closes.length - 1];
            const prev = closes[closes.length - 2];
            const change = ((price - prev) / prev * 100).toFixed(2);
            return { symbol, price: price.toFixed(2), change };
        } catch (e) {
            return { symbol, price: 'ERR', change: '0.00' };
        }
    }

    async function updateTerminal() {
        for (const s of tickers) {
            const data = await fetchTicker(s);
            const elements = document.querySelectorAll('.ticker');
            elements.forEach(el => {
                if (el.innerText === s) {
                    const valEl = el.nextElementSibling;
                    valEl.innerText = `${data.change}%`;
                    valEl.className = data.change >= 0 ? 'val-up' : 'val-down';
                }
            });
        }
    }

    updateTerminal();
    setInterval(updateTerminal, 60000);
</script>

</body>
</html>
