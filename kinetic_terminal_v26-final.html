<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <title>KINETIC // MARKET INTELLIGENCE TERMINAL</title>
    <style>
    * { box-sizing: border-box; margin: 0; padding: 0 }
    :root {
        --bg: #0b0e11;
        --surface: #14171a;
        --border: rgba(255,255,255,0.06);
        --border2: rgba(255,255,255,0.12);
        --green: #00ffaa;
        --red: #ff3355;
        --text: #ffffff;
        --muted: #707a8a;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; font-size: 13px; overflow-x: hidden }
    
    /* HEADER STRUCTURE */
    .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; background: var(--surface); border-bottom: 1px solid var(--border2); position: sticky; top: 0; z-index: 100 }
    .logo { font-weight: 900; letter-spacing: 2px; font-size: 18px; display: flex; align-items: center; gap: 10px }
    .logo span { color: var(--green) }
    
    .status-pill { background: var(--bg); border: 1px solid var(--border2); border-radius: 20px; padding: 6px 14px; font-size: 10px; font-weight: 800; color: var(--muted); display: flex; align-items: center; gap: 8px; letter-spacing: 1px }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green) }

    /* GRID SYSTEM */
    .terminal-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 16px; padding: 24px }
    .card { background: var(--surface); border: 1px solid var(--border2); border-radius: 12px; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.4) }
    .ch { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.02) }
    .ct { font-size: 10px; font-weight: 900; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px }
    .cb { padding: 8px 20px 20px }

    /* DATA ROWS */
    .row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border) }
    .row:last-child { border: none }
    .sym { font-family: 'IBM Plex Mono', monospace; font-weight: 700; font-size: 15px }
    .val { font-family: 'IBM Plex Mono', monospace; font-weight: 600 }
    
    .badge { font-size: 9px; font-weight: 900; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.5px }
    .up { color: var(--green) } .dn { color: var(--red) }
    .bg-up { background: rgba(0,255,170,0.1); color: var(--green); border: 1px solid rgba(0,255,170,0.2) }
    .bg-dn { background: rgba(255,51,85,0.1); color: var(--red); border: 1px solid rgba(255,51,85,0.2) }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">KINETIC <span>//</span> 2.0</div>
    <div class="status-pill"><span class="status-dot"></span><span id="market-phase">SYSTEM ONLINE</span></div>
</div>

<div class="terminal-grid">
    <div class="card">
        <div class="ch"><span class="ct">Macro Velocity // 5D</span></div>
        <div class="cb" id="macro-list">
            <div class="row"><span>Synchronizing Physics...</span></div>
        </div>
    </div>

    <div class="card">
        <div class="ch"><span class="ct">Sector Momentum // Acceleration</span></div>
        <div class="cb" id="sector-list">
            <div class="row"><span>Synchronizing Physics...</span></div>
        </div>
    </div>

    <div class="card">
        <div class="ch"><span class="ct">Systemic Volatility // Pressure</span></div>
        <div class="cb" id="risk-list">
            <div class="row"><span>Synchronizing Physics...</span></div>
        </div>
    </div>
</div>

<script>
