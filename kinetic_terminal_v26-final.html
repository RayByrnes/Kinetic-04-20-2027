<!DOCTYPE html>			
<html lang="en">			
<head>			
<meta charset="UTF-8">			
<title>KINETIC // UNIVERSAL MASTER V20</title>			
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">			
<style>			
:root {			
--bg: #000000; --tile-bg: #080808; --border: rgba(255, 255, 255, 0.08);			
--accent: #00ffaa; --recovery: #ffcc00; --danger: #ff3355; --text: #ffffff;			
--muted: #555555; --font-ui: 'Inter', sans-serif; --font-data: 'IBM Plex Mono', monospace;			
}			
			
body { background-color: var(--bg); color: var(--text); font-family: var(--font-ui); margin: 0; padding: 40px; -webkit-font-smoothing: antialiased; }			
.container { max-width: 1700px; margin: 0 auto; }			
			
header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 50px; border-bottom: 1px solid var(--border); padding-bottom: 30px; }			
.brand-block { display: flex; align-items: center; gap: 15px; }			
.brand-glyph { width: 22px; height: 22px; background: var(--accent); clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%); }			
.brand-text { font-weight: 900; font-size: 24px; letter-spacing: 10px; text-transform: uppercase; }			
			
.control-bar { display: flex; gap: 20px; margin-bottom: 30px; }			
.mode-btn { background: #111; border: 1px solid var(--border); color: var(--muted); padding: 8px 16px; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; font-family: var(--font-data); }			
.mode-btn.active { color: var(--accent); border-color: var(--accent); }			
			
.group-label { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 5px; color: var(--muted); margin: 40px 0 20px; display: flex; align-items: center; gap: 20px; }			
.group-label::after { content: ""; height: 1px; background: var(--border); flex-grow: 1; }			
			
/* GRID DENSITY STATES */			
.grid { display: grid; gap: 15px; transition: all 0.3s ease; }			
.grid.standard { grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); }			
.grid.compact { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }			
			
.tile { background: var(--tile-bg); border: 1px solid var(--border); padding: 25px; transition: 0.3s; position: relative; }			
.compact .tile { padding: 15px; }			
			
.tile-header { display: flex; justify-content: space-between; margin-bottom: 25px; }			
.compact .tile-header { margin-bottom: 10px; }			
.symbol { font-family: var(--font-data); font-size: 24px; font-weight: 700; line-height: 1; }			
.compact .symbol { font-size: 18px; }			
.sector-name { color: var(--muted); font-size: 8px; text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; display: block; }			
.compact .sector-name { display: none; }			
			
.price-block { text-align: right; font-family: var(--font-data); }			
.price { font-size: 18px; font-weight: 600; }			
.compact .price { font-size: 14px; }			
.delta { font-size: 10px; margin-top: 4px; }			
			
.bar-container { height: 2px; width: 100%; background: #111; margin-bottom: 20px; }			
.compact .bar-container { margin-bottom: 10px; }			
.vector-fill { height: 100%; width: 0; transition: width 1s ease; }			
			
.thrust-val { font-family: var(--font-data); font-size: 28px; font-weight: 700; line-height: 1; color: var(--tile-accent); }			
.compact .thrust-val { font-size: 20px; }			
.thrust-label { font-size: 8px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 8px; display: block; }			
			
.action-badge { background: rgba(255,255,255,0.02); padding: 10px; margin-top: 20px; border-bottom: 2px solid var(--tile-accent); font-size: 10px; font-family: var(--font-data); font-weight: 900; color: var(--tile-accent); letter-spacing: 1px; }			
.compact .action-badge { margin-top: 10px; padding: 5px; font-size: 8px; }			
</style>			
</head>			
<body>			
			
<div class="container">			
<header>			
<div class="brand-block">			
<div class="brand-glyph"></div>			
<div class="brand-text">KINETIC</div>			
</div>			
<div class="control-bar">			
<button class="mode-btn active" onclick="setDensity('standard')">Standard</button>			
<button class="mode-btn" onclick="setDensity('compact')">Compact</button>			
</div>			
</header>			
			
<div class="group-label">Tactical Expansion</div>			
<div id="long-grid" class="grid standard"></div>			
			
<div class="group-label">Structural Rotation</div>			
<div id="short-grid" class="grid standard"></div>			
</div>			
			
<script>			
const data = [			
{ t: 'XLK', n: 'Technology', v: 8.2, a: 4.1, q: 'EXPANSION', p: 207.92, d: 1.20 },			
{ t: 'XLE', n: 'Energy', v: 4.9, a: 5.8, q: 'EXPANSION', p: 94.15, d: 2.10 },			
{ t: 'XLU', n: 'Utilities', v: -1.2, a: -0.5, q: 'RECOVERY', p: 72.36, d: -0.42 },			
{ t: 'XLP', n: 'Staples', v: -2.4, a: -1.6, q: 'CAPITULATION', p: 78.15, d: -0.85 },			
{ t: 'XLY', n: 'Cons Disc', v: -3.1, a: -1.2, q: 'CAPITULATION', p: 175.40, d: -1.10 },			
{ t: 'XLV', n: 'Health Care', v: -0.8, a: 0.4, q: 'RECOVERY', p: 145.60, d: -0.25 },			
{ t: 'XLF', n: 'Financials', v: -4.2, a: -2.1, q: 'CAPITULATION', p: 42.12, d: -1.35 },			
{ t: 'XLI', n: 'Industrials', v: -2.5, a: -0.9, q: 'RECOVERY', p: 122.45, d: -0.75 },			
{ t: 'XLB', n: 'Materials', v: -1.5, a: 0.2, q: 'RECOVERY', p: 89.10, d: -0.40 },			
{ t: 'XLRE', n: 'Real Estate', v: 0.5, a: 0.8, q: 'EXPANSION', p: 41.30, d: 0.15 },			
{ t: 'XLC', n: 'Comm Svcs', v: 2.1, a: 1.5, q: 'EXPANSION', p: 82.20, d: 0.65 }			
];			
			
function render() {			
const longGrid = document.getElementById('long-grid');			
const shortGrid = document.getElementById('short-grid');			
longGrid.innerHTML = ''; shortGrid.innerHTML = '';			
			
data.forEach(s => {			
const tile = document.createElement('div');			
tile.className = 'tile';			
let color = s.v >= 0 ? 'var(--accent)' : 'var(--danger)';			
if (s.q === 'RECOVERY') color = 'var(--recovery)';			
tile.style.setProperty('--tile-accent', color);			
			
tile.innerHTML = `			
<div class="tile-header">			
<div><span class="symbol">${s.t}</span><span class="sector-name">${s.n}</span></div>			
<div class="price-block">			
<span class="price">$${s.p.toFixed(2)}</span>			
<div class="delta" style="color: ${s.d >= 0 ? 'var(--accent)' : 'var(--danger)'}">			
${s.d >= 0 ? '▲' : '▼'} ${Math.abs(s.d).toFixed(2)}%			
</div>			
</div>			
</div>			
<div class="bar-container"><div class="vector-fill" id="bar-${s.t}" style="background:${color}; width:${Math.abs(s.v * 8) + 10}%"></div></div>			
<div class="thrust-block"><span class="thrust-val">${s.a >= 0 ? '+' : ''}${s.a}</span><span class="thrust-label">Thrust</span></div>			
<div class="action-badge">${s.q}</div>			
`;			
(s.v >= 0 ? longGrid : shortGrid).appendChild(tile);			
});			
}			
			
function setDensity(mode) {			
document.querySelectorAll('.grid').forEach(g => g.className = `grid ${mode}`);			
document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase() === mode));			
}			
			
render();			
</script>			
</body>			
</html>
